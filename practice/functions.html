<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Functions</title>
	</head>	
	<body>
		<h1>Here Be Functions</h1>
		<script>
console.log("test");
function sayHi(){
console.log("hi");
}
sayHi();

sayHiToSomeone(who){
	console.log("hi "+who);
}
sayHiToSomeone("cole");
function sayHiToPeople(who1, who2){
	console.log("hi "+who1 + " and "+ who2);
}
sayHiToPeople("Romeo","Juliet");

		</script>
	</body>
</html>
