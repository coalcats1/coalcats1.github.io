<!DOCTYPE>
<html lang="en">
	<head>
		<title>Off Screen Acident</title>
	</head>
	<body>
		<canvas id="a" width=1375 height=800></canvas>
		<script>
			const canvas = document.getElementById("a");
			const ctx = canvas.getContext("2d");
			
			let x = 50;
			let y = 0;
			let a = 150;
			let b = 300;
			let s = 50;
		function animate(){
			x=x+10;
			s=s+12
			console.log(x);
			ctx.clearRect(0,0,1375,800);
			ctx.fillStyle = "grey";
			ctx.fillRect(x,y,100,100);
			ctx.fill();
			ctx.fillStyle = "blue";
			ctx.fillRect(x,y,80,100);
			ctx.fillRect(x-50,y+50,200,50);
			ctx.fill();
			ctx.fillStyle = "black";
			ctx.beginPath();
			ctx.arc(
				x-15,
				100,
				20,
				0,
				2*Math.PI
				);
			ctx.fill();
			ctx.beginPath();
			ctx.arc(
				x+100,
				100,
				20,
				0,
				2*Math.PI
				);
			ctx.fill();


			if(s >= 800){
				s=s+11;
				ctx.beginPath();
				ctx.fillStyle = "grey";
				ctx.fillRect(s-1350,y,100,100);
				ctx.fill();
				ctx.beginPath();
				ctx.fillStyle = "red";
				ctx.fillRect(s-1350,y,80,100);
				ctx.fillRect(s-1400,y+50,200,50);
				ctx.fill();
				ctx.beginPath();
				ctx.fillStyle = "black";
				ctx.arc(
					s-1365,
					100,
					20,
					0,
					2*Math.PI
					);
				ctx.arc(
					s-1250,
					100,
					20,
					0,
					2*Math.PI
					);
				ctx.fill();
				ctx.beginPath();	//New car 
				ctx.fillStyle = "grey";
				ctx.fillRect(s-1350,a,100,100);
				ctx.fill();
				ctx.beginPath();
				ctx.fillStyle = "red";
				ctx.fillRect(s-1350,a,80,100);
				ctx.fillRect(s-1400,a+50,200,50);
				ctx.fill();
				 ctx.beginPath();
                                ctx.fillStyle = "black";
                                ctx.arc(
                                        s-1365,
                                        a+100,
                                        20,
                                        0,
                                        2*Math.PI
                                        );
                                ctx.arc(
                                        s-1250,
                                        a+100,
                                        20,
                                        0,
                                        2*Math.PI
                                        );
                                ctx.fill();	
			}
			if(x >= 3125){
				x = 0;
				s = 0;
			}
			requestAnimationFrame(animate);
		}
			animate();
		</script>
	</body>
</html>
