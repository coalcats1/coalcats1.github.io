<!DOCTYPE html>
<html lang="en">
        <head>

<style>

     transform: translateX(20px) translateY(20px);

        grid-area: imageA;
}

    width: 100%;

    object-fit: cover;
}
#sideAb{
        grid-area:footA;
        overflow: hidden;
        background-color: rgb(250,250,250,.75);

}
#text{
        transform: translateY(0px) translateX(10px);
}
#stuffs{
        grid-area: stuff;
        background-color: rgb(250,250,250,.75);
}
#sideA{
        grid-area: sideA;
}

}
